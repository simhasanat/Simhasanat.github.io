<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simhasanat | KUT: Gök-Yol Rehberi</title>
    <style>
        :root {
            --bg-color: #0a0f1d;
            --panel-bg: rgba(16, 24, 48, 0.95);
            --accent-cyan: #00f5d4;
            --accent-blue: #00b4d8;
            --text-main: #f4f6f9;
            --text-muted: #90e0ef;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 60px 20px;
            margin: 0;
            background-image: radial-gradient(circle at 50% 50%, #14213d 0%, #0a0f1d 100%);
        }
        .otag-kapsayici {
            max-width: 750px;
            margin: 0 auto;
            border: 2px solid var(--accent-blue);
            padding: 40px 30px;
            border-radius: 24px;
            background: var(--panel-bg);
            box-shadow: 0 0 40px rgba(0, 180, 216, 0.2);
        }
        .logo-alani svg {
            width: 90px;
            height: 90px;
            fill: var(--accent-cyan);
            filter: drop-shadow(0 0 10px rgba(0, 245, 212, 0.5));
        }
        h1 {
            font-size: 36px;
            margin: 15px 0 5px 0;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(0, 245, 212, 0.3);
        }
        .alt-baslik {
            color: var(--text-muted);
            font-size: 16px;
            margin-bottom: 40px;
            font-style: italic;
            letter-spacing: 1px;
        }
        .form-grup {
            margin-bottom: 25px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: var(--accent-cyan);
            font-weight: 600;
            font-size: 13px;
            letter-spacing: 1px;
        }
        input {
            width: 100%;
            padding: 14px 15px;
            border: 1px solid var(--accent-blue);
            background-color: #020813;
            color: #ffffff;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 15px;
            transition: all 0.3s ease;
        }
        input:focus {
            outline: none;
            border-color: var(--accent-cyan);
            box-shadow: 0 0 12px rgba(0, 245, 212, 0.25);
        }
        button {
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
            color: #0a0f1d;
            padding: 16px 45px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            letter-spacing: 1px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 20px rgba(0, 245, 212, 0.3);
            margin-top: 15px;
            text-transform: uppercase;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(0, 245, 212, 0.5);
            color: #ffffff;
        }
        #destan-alani {
            margin-top: 40px;
            padding-top: 35px;
            border-top: 2px dashed var(--accent-blue);
            line-height: 1.8;
            text-align: left;
        }
        .destan-kart {
            background: rgba(255, 255, 255, 0.02);
            border-left: 4px solid var(--accent-cyan);
            padding: 22px;
            margin-bottom: 25px;
            border-radius: 0 16px 16px 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .destan-baslik {
            font-weight: bold;
            color: var(--accent-cyan);
            font-size: 19px;
            margin-bottom: 4px;
        }
        .destan-unvan {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 12px;
            font-weight: 600;
        }
        .yukleniyor {
            text-align: center;
            font-style: italic;
            color: var(--text-muted);
            padding: 20px 0;
        }
    </style>
</head>
<body>

    <div class="otag-kapsayici">
        <div class="logo-alani">
            <svg viewBox="0 0 24 24">
                <path d="M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2M12,4A2,2 0 0,1 14,6A2,2 0 0,1 12,8A2,2 0 0,1 10,6A2,2 0 0,1 12,4M12,18C11.11,18 10.26,17.8 9.5,17.45C11.56,16.5 13,14.42 13,12C13,9.58 11.56,7.5 9.5,6.55C10.26,6.2 11.11,6 12,6A6,6 0 0,1 18,12A6,6 0 0,1 12,18Z" />
            </svg>
        </div>
        
        <h1>Gök Bilge'nin Otağı</h1>
        <div class="alt-baslik">KUT: Gök-Yol Rehberi Analiz Motoru</div>
        
        <div class="form-grup">
            <label for="ad">ADINIZ / MAHLASINIZ:</label>
            <input type="text" id="ad" placeholder="Örn: Asena, Bilge, Alp...">
        </div>

        <div class="form-grup">
            <label for="dogumTarihi">DOĞUM TARİHİ:</label>
            <input type="date" id="dogumTarihi">
        </div>

        <div class="form-grup">
            <label for="dogumSaati">DOĞUM SAATİ:</label>
            <input type="time" id="dogumSaati">
        </div>

        <button onclick="kutHesapla()">Yazgı Yazıtını Oku</button>

        <div id="destan-alani" style="display: none;"></div>
    </div>

    <script>
        function kutHesapla() {
            const ad = document.getElementById('ad').value;
            const tarih = document.getElementById('dogumTarihi').value;
            const saat = document.getElementById('dogumSaati').value;
            const destanAlani = document.getElementById('destan-alani');
            
            if(!ad || !tarih || !saat) {
                alert("Lütfen otağa kabul edilmek için bilgilerinizi eksiksiz girin.");
                return;
            }

            destanAlani.style.display = "block";
            destanAlani.innerHTML = `<div class="yukleniyor">
                <h3>Gök Meclisi \${ad} için toplanıyor...</h3>
                <p>Gök Bilge yıldız konaklarını inceliyor, kutlu esintiler birazdan yazgına fısıldayacak.</p>
            </div>`;

            setTimeout(() => {
                const tGun = new Date(tarih).getDate() || 1;
                const sSaat = parseInt(saat.split(':')[0]) || 12;
                
                const burclar = [
                    "Pars Otağı (Koç)", "Sığır Otağı (Boğa)", "İkizler Otağı (İkizler)", 
                    "Yengeç Otağı (Yengeç)", "Arslan Otağı (Aslan)", "Başak Otağı (Başak)", 
                    "Terazi Otağı (Terazi)", "Akrep Otağı (Akrep)", "Yay Han Otağı (Yay)", 
                    "Oğlak Otağı (Oğlak)", "Kova Otağı (Kova)", "Balık Otağı (Balık)"
                ];
                
                const yukselenBurc = burclar[(tGun + sSaat) % 12];
                
                destanAlani.innerHTML = `
                    <h2 style="color: #00f5d4; text-align: center; margin-bottom: 30px;">— \${ad} Han'ın Yazgı Destanı —</h2>
                    
                    <div class="destan-kart">
                        <div class="destan-baslik">Yükselen Karakter: \${yukselenBurc}</div>
                        <div class="destan-unvan">Otağ ve Alp Kapısı</div>
                        <p>Dünyayı adeta bu otağın pencerelerinden seyrediyor, yaşamı bu zırhla karşılıyorsun. Ruhunun dış dünyaya vuran ilk soluğu, bu konağın töresiyle şekillenir.</p>
                    </div>

                    <div class="destan-kart">
                        <div class="destan-baslik">Kün Han (Güneş) Yerleşimi</div>
                        <div class="destan-unvan">Ruhun Sönmeyen Közü</div>
                        <p>Öz kimliğini ve yaşam amacını temsil eden Kün Han, haritanda parlıyor. İçindeki kutsal ateşi besleme, iradeni ve yaratıcılığını bir hakan edasıyla toplum önünde sergileme vaktindir.</p>
                    </div>

                    <div class="destan-kart">
                        <div class="destan-baslik">Ay Ata (Ay) Yerleşimi</div>
                        <div class="destan-unvan">Duyguların Sonsuz Ummanı</div>
                        <p>Zihnini, sezgilerini ve hafızanı yöneten Ay Ata, sana derin hisler fısıldıyor. Ruhunun sesini duyabilmek için karmaşadan uzaklaşmalı, kendi sessiz sığınaklarında yıldızların ritmini dinlemelisin.</p>
                    </div>

                    <div class="destan-kart">
                        <div class="destan-baslik">Erlik Han (Satürn) Sınavı</div>
                        <div class="destan-unvan">Zamanın ve Törenin Muhafızı</div>
                        <p>Hayatındaki gecikmeler, sorumluluklar ve geçmen gereken büyük sabır sınavları Erlik Han'ın gözetimindedir. Karşılaştığın engeller bir ceza değil; ruhunu çelikleştirmek, seni gerçek bir bilgiye ulaştırmak için konulmuş sınır taşlarıdır.</p>
                    </div>

                    <div class="destan-kart">
                        <div class="destan-baslik">Ülgen Han (Jüpiter) Bereketi</div>
                        <div class="destan-unvan">Göklerin Bilgelik Kapısı</div>
                        <p>Sana bahşedilen bolluk, yüksek idrak ve ruhsal koruma Ülgen Han'ın elindedir. Paylaştıkça artan bu ilahi hazineyi hayatına almak için, bilgeliği rehber edinmeli ve çevrene kut saçmalısın.</p>
                    </div>

                    <p style="text-align: center; color: #90e0ef; font-style: italic; margin-top: 35px;">"Gök Tanrı'nın ışığı ve Gök Bilge'nin şefkati yolunu her daim aydınlatsın."</p>
                `;
                destanAlani.scrollIntoView({ behavior: 'smooth' });
            }, 2500);
        }
    </script>
</body>
</html>
